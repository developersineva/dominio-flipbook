<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DOMINIO — FLC x Berdez x Sineva</title>
<style>
  :root{
    --gold:#c9a44c;
    --gold-soft:#e7cd8e;
    --green-deep:#08110c;
    --green:#13241a;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; height:100%; overflow:hidden;
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    color:#eee; background:var(--green-deep);
  }

  /* ---- themed background: emerald + art-deco gold lattice + soft light ---- */
  .bg{ position:fixed; inset:0; z-index:0; overflow:hidden; }
  .bg-base{ position:absolute; inset:0;
    background:radial-gradient(150% 125% at 50% 120%, #1f3b29 0%, var(--green) 36%, var(--green-deep) 74%, #040805 100%); }
  .pattern{ position:absolute; inset:-2px; opacity:.07;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><g fill='none' stroke='%23c9a44c' stroke-width='1'><path d='M0 64 L64 0 M-16 16 L16 -16 M48 80 L80 48'/><path d='M0 0 L64 64 M-16 48 L16 80 M48 -16 L80 16'/></g><g fill='%23c9a44c'><circle cx='0' cy='0' r='1.1'/><circle cx='64' cy='0' r='1.1'/><circle cx='0' cy='64' r='1.1'/><circle cx='64' cy='64' r='1.1'/><circle cx='32' cy='32' r='1.1'/></g></svg>");
    background-size:64px 64px; }
  .glow{ position:absolute; border-radius:50%; filter:blur(64px); opacity:.42; will-change:transform; }
  .glow.g1{ width:64vmax; height:64vmax; left:50%; top:-26vmax; margin-left:-32vmax;
    background:radial-gradient(closest-side, rgba(201,164,76,.55), rgba(201,164,76,0) 70%);
    animation:drift1 30s ease-in-out infinite; }
  .glow.g2{ width:44vmax; height:44vmax; left:-12vmax; bottom:-16vmax;
    background:radial-gradient(closest-side, rgba(91,150,110,.4), rgba(91,150,110,0) 70%);
    animation:drift2 36s ease-in-out infinite; }
  @keyframes drift1{ 0%,100%{transform:translate(-3%,0) scale(1)} 50%{transform:translate(4%,3%) scale(1.06)} }
  @keyframes drift2{ 0%,100%{transform:translate(0,0)} 50%{transform:translate(7%,-5%)} }
  .vignette{ position:absolute; inset:0;
    background:radial-gradient(130% 100% at 50% 46%, rgba(0,0,0,0) 50%, rgba(0,0,0,.62) 100%); }
  .grain{ position:absolute; inset:0; opacity:.045; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }

  /* ---- book ---- */
  #stage{ position:fixed; inset:0; z-index:2; display:flex; align-items:center; justify-content:center; }
  #bookWrap{ position:relative; filter:drop-shadow(0 26px 50px rgba(0,0,0,.62)); }
  #book{ touch-action:pan-y; }
  .page{ background:#fff; overflow:hidden; }
  .page img{ width:100%; height:100%; display:block; object-fit:cover; }

  /* ---- tap zones ---- */
  .tapzone{ position:fixed; top:0; bottom:0; width:26%; z-index:4;
    display:flex; align-items:center; cursor:pointer; user-select:none; }
  #tzLeft{ left:0; justify-content:flex-start; padding-left:10px; }
  #tzRight{ right:0; justify-content:flex-end; padding-right:10px; }
  .arrow{ width:48px; height:48px; border-radius:50%; display:grid; place-items:center;
    font-size:24px; color:var(--gold-soft); background:rgba(8,17,12,.42);
    border:1px solid rgba(201,164,76,.35); backdrop-filter:blur(4px);
    opacity:0; transition:opacity .35s; pointer-events:none; }
  .tapzone.peek .arrow{ opacity:.85; }

  #hint{ position:fixed; top:calc(env(safe-area-inset-top,0) + 16px); left:50%;
    transform:translateX(-50%); z-index:6; font-size:13px; letter-spacing:.4px; color:#e4dcc8;
    background:rgba(8,17,12,.72); border:1px solid rgba(201,164,76,.3);
    padding:8px 16px; border-radius:30px; transition:opacity .7s; pointer-events:none;
    text-align:center; max-width:86vw; }
  #counter{ position:fixed; bottom:calc(env(safe-area-inset-bottom,0) + 14px); left:50%;
    transform:translateX(-50%); z-index:6; font-size:12px; letter-spacing:2px; color:var(--gold);
    background:rgba(8,17,12,.55); padding:5px 14px; border-radius:20px;
    transition:opacity .6s; pointer-events:none; }
  #counter.dim{ opacity:0; }
  #loader{ position:fixed; inset:0; z-index:50; display:grid; place-items:center;
    color:var(--gold); letter-spacing:7px; font-size:14px; background:var(--green-deep); }
  #loader span{ animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:.35} 50%{opacity:1} }
</style>
</head>
<body>
  <div class="bg">
    <div class="bg-base"></div>
    <div class="pattern"></div>
    <div class="glow g1"></div><div class="glow g2"></div>
    <div class="grain"></div>
    <div class="vignette"></div>
  </div>

  <div id="loader"><span>D O M I N I O</span></div>
  <div id="hint">Toca a la derecha para avanzar · a la izquierda para retroceder</div>

  <div id="stage"><div id="bookWrap"><div id="book"></div></div></div>

  <div class="tapzone" id="tzLeft"><div class="arrow">‹</div></div>
  <div class="tapzone" id="tzRight"><div class="arrow">›</div></div>
  <div id="counter">1 / 36</div>

  <script src="lib/page-flip.browser.js"></script>
  <script>
    const TOTAL = 36;
    const SRC_W = 1224, SRC_H = 1584;
    const ASPECT = SRC_H / SRC_W;

    const bookEl  = document.getElementById('book');
    const wrapEl  = document.getElementById('bookWrap');
    const counter = document.getElementById('counter');

    function makePages(){
      let html='';
      for(let i=1;i<=TOTAL;i++){
        const n=String(i).padStart(2,'0');
        html += `<div class="page"><img src="pages/page-${n}.jpg" alt="Página ${i}" loading="lazy"></div>`;
      }
      bookEl.innerHTML=html;
    }

    /* smaller page with comfortable side margins */
    function calcSize(){
      const mW=window.innerWidth*0.82, mH=window.innerHeight*0.90;
      let h=mH, w=h/ASPECT;
      if(w>mW){ w=mW; h=w*ASPECT; }
      return {w:Math.floor(w),h:Math.floor(h)};
    }

    /* ---------- real page-flip sound (CC0 mp3), pooled for rapid flips ---------- */
    const POOL=[]; let unlocked=false, pi=0;
    function buildPool(){
      for(let i=0;i<4;i++){ const a=new Audio('sound/page-flip.mp3'); a.preload='auto'; a.volume=0.85; POOL.push(a); }
    }
    function unlockAudio(){
      if(unlocked) return; unlocked=true;
      POOL.forEach(a=>{ a.muted=true; const p=a.play(); if(p&&p.then) p.then(()=>{a.pause();a.currentTime=0;a.muted=false;}).catch(()=>{a.muted=false;}); });
    }
    function playFlip(){
      if(!POOL.length) return;
      const a=POOL[pi=(pi+1)%POOL.length];
      try{ a.currentTime=0; const p=a.play(); if(p&&p.catch) p.catch(()=>{}); }catch(e){}
    }

    function preload(idx){
      for(let k=idx-1;k<=idx+2;k++){
        if(k>=0&&k<TOTAL){ const n=String(k+1).padStart(2,'0'); const im=new Image(); im.src=`pages/page-${n}.jpg`; }
      }
    }

    /* ---------- flipbook ---------- */
    let pf;
    function buildFlip(startIndex){
      const {w,h}=calcSize();
      wrapEl.style.width=w+'px'; wrapEl.style.height=h+'px';
      pf=new St.PageFlip(bookEl,{
        width:w,height:h,size:'fixed',
        usePortrait:true, showCover:true,
        drawShadow:true, maxShadowOpacity:0.3,
        flippingTime:600, swipeDistance:22,
        disableFlipByClick:false,
        mobileScrollSupport:false, useMouseEvents:true,
      });
      pf.loadFromHTML(document.querySelectorAll('#book .page'));
      if(startIndex) pf.turnToPage(startIndex);
      pf.on('flip', e=>{ updateCounter(e.data); preload(e.data); });
      pf.on('changeState', e=>{ if(e.data==='flipping') playFlip(); });
      updateCounter(pf.getCurrentPageIndex()); preload(pf.getCurrentPageIndex());
    }

    let dimTimer;
    function updateCounter(idx){
      counter.textContent=(idx+1)+' / '+TOTAL;
      counter.classList.remove('dim');
      clearTimeout(dimTimer); dimTimer=setTimeout(()=>counter.classList.add('dim'),1800);
    }

    /* ---------- tap-zone navigation ---------- */
    function goNext(){ unlockAudio(); if(pf) pf.flipNext('top'); }
    function goPrev(){ unlockAudio(); if(pf) pf.flipPrev('top'); }
    function bindZone(el, fn){
      let sx=0, sy=0, st=0, moved=false;
      el.addEventListener('pointerdown', e=>{ unlockAudio(); sx=e.clientX; sy=e.clientY; st=e.timeStamp; moved=false; });
      el.addEventListener('pointermove', e=>{ if(Math.hypot(e.clientX-sx,e.clientY-sy)>14) moved=true; });
      el.addEventListener('pointerup',   e=>{
        const horiz=e.clientX-sx;
        if(!moved && (e.timeStamp-st)<400){ fn(); }
        else if(Math.abs(horiz)>30){ horiz>0 ? goPrev() : goNext(); }
      });
    }
    bindZone(document.getElementById('tzLeft'),  goPrev);
    bindZone(document.getElementById('tzRight'), goNext);
    addEventListener('keydown', e=>{ if(e.key==='ArrowRight') goNext(); if(e.key==='ArrowLeft') goPrev(); });

    /* ---------- responsive ---------- */
    let lastW=innerWidth,lastH=innerHeight,rT;
    addEventListener('resize', ()=>{
      if(Math.abs(innerWidth-lastW)<40&&Math.abs(innerHeight-lastH)<40) return;
      lastW=innerWidth; lastH=innerHeight;
      clearTimeout(rT); rT=setTimeout(()=>{ const c=pf.getCurrentPageIndex(); pf.destroy(); buildFlip(c); },220);
    });

    /* ---------- boot ---------- */
    makePages(); buildPool();
    const cover=new Image();
    cover.onload=()=>{
      buildFlip(0);
      document.getElementById('loader').style.display='none';
      document.querySelectorAll('.tapzone').forEach(z=>z.classList.add('peek'));
      setTimeout(()=>document.querySelectorAll('.tapzone').forEach(z=>z.classList.remove('peek')),2600);
      setTimeout(()=>{ const h=document.getElementById('hint'); h.style.opacity='0'; setTimeout(()=>h.remove(),800); },4500);
    };
    cover.onerror=()=>{ document.getElementById('loader').innerHTML='<span>Error al cargar</span>'; };
    cover.src='pages/page-01.jpg';
  </script>
</body>
</html>
