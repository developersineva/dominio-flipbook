<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DOMINIO — FLC x Berdez x Sineva</title>
<style>
  :root{ --gold:#c9a44c; --gold-soft:#e7cd8e; --green-deep:#08110c; --green:#13241a; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; overflow:hidden;
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif; color:#eee; background:var(--green-deep); }

  /* ---- themed background ---- */
  .bg{ position:fixed; inset:0; z-index:0; overflow:hidden; }
  .bg-base{ position:absolute; inset:0;
    background:radial-gradient(150% 125% at 50% 120%, #1f3b29 0%, var(--green) 36%, var(--green-deep) 74%, #040805 100%); }
  .pattern{ position:absolute; inset:-2px; opacity:.07; background-size:64px 64px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><g fill='none' stroke='%23c9a44c' stroke-width='1'><path d='M0 64 L64 0 M-16 16 L16 -16 M48 80 L80 48'/><path d='M0 0 L64 64 M-16 48 L16 80 M48 -16 L80 16'/></g><g fill='%23c9a44c'><circle cx='0' cy='0' r='1.1'/><circle cx='64' cy='0' r='1.1'/><circle cx='0' cy='64' r='1.1'/><circle cx='64' cy='64' r='1.1'/><circle cx='32' cy='32' r='1.1'/></g></svg>"); }
  .glow{ position:absolute; border-radius:50%; filter:blur(64px); opacity:.42; will-change:transform; }
  .glow.g1{ width:64vmax; height:64vmax; left:50%; top:-26vmax; margin-left:-32vmax;
    background:radial-gradient(closest-side, rgba(201,164,76,.55), rgba(201,164,76,0) 70%); animation:drift1 30s ease-in-out infinite; }
  .glow.g2{ width:44vmax; height:44vmax; left:-12vmax; bottom:-16vmax;
    background:radial-gradient(closest-side, rgba(91,150,110,.4), rgba(91,150,110,0) 70%); animation:drift2 36s ease-in-out infinite; }
  @keyframes drift1{ 0%,100%{transform:translate(-3%,0) scale(1)} 50%{transform:translate(4%,3%) scale(1.06)} }
  @keyframes drift2{ 0%,100%{transform:translate(0,0)} 50%{transform:translate(7%,-5%)} }
  .vignette{ position:absolute; inset:0; background:radial-gradient(130% 100% at 50% 46%, rgba(0,0,0,0) 50%, rgba(0,0,0,.62) 100%); }
  .grain{ position:absolute; inset:0; opacity:.045; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }

  /* ---- book ---- */
  #stage{ position:fixed; inset:0; z-index:2; display:flex; align-items:center; justify-content:center; }
  #bookWrap{ position:relative; filter:drop-shadow(0 26px 50px rgba(0,0,0,.62)); }
  #book{ touch-action:pan-y; }
  .page{ background:#fff; overflow:hidden; }
  .page img{ width:100%; height:100%; display:block; object-fit:cover; }

  /* ---- tap zones ---- */
  .tapzone{ position:fixed; top:0; bottom:0; width:26%; z-index:4; display:flex; align-items:center; cursor:pointer; user-select:none; }
  #tzLeft{ left:0; justify-content:flex-start; padding-left:10px; }
  #tzRight{ right:0; justify-content:flex-end; padding-right:10px; }
  .arrow{ width:48px; height:48px; border-radius:50%; display:grid; place-items:center; font-size:24px; color:var(--gold-soft);
    background:rgba(8,17,12,.42); border:1px solid rgba(201,164,76,.35); backdrop-filter:blur(4px);
    opacity:0; transition:opacity .35s; pointer-events:none; }
  .tapzone.peek .arrow{ opacity:.85; }

  /* ---- toolbar buttons ---- */
  .toolbar-btn{ position:fixed; z-index:7; width:44px; height:44px; border-radius:50%;
    border:1px solid rgba(201,164,76,.4); background:rgba(8,17,12,.62); color:var(--gold-soft);
    font-size:18px; cursor:pointer; display:grid; place-items:center; backdrop-filter:blur(6px); }
  .toolbar-btn:active{ transform:scale(.94); }
  #zoomBtn{ right:14px; bottom:calc(env(safe-area-inset-bottom,0) + 12px); }
  #fullscreenBtn{ right:14px; bottom:calc(env(safe-area-inset-bottom,0) + 64px); font-size:16px; }

  /* ---- page counter (tappable for jump) ---- */
  #counter{ position:fixed; bottom:calc(env(safe-area-inset-bottom,0) + 14px); left:50%; transform:translateX(-50%); z-index:6;
    font-size:12px; letter-spacing:2px; color:var(--gold); background:rgba(8,17,12,.55); padding:5px 14px; border-radius:20px;
    transition:opacity .6s; cursor:pointer; user-select:none; }
  #counter.dim{ opacity:.35; }
  #counter:hover{ opacity:1 !important; }

  /* ---- page jump modal ---- */
  #jumpModal{ position:fixed; inset:0; z-index:45; display:none; place-items:center; background:rgba(5,10,7,.92); }
  #jumpModal.open{ display:grid; }
  #jumpInner{ text-align:center; padding:24px; }
  #jumpInner h3{ margin:0 0 16px; font-size:16px; letter-spacing:1px; color:var(--gold-soft); font-weight:400; }
  #jumpGrid{ display:grid; grid-template-columns:repeat(6, 44px); gap:8px; justify-content:center; }
  .jump-page{ width:44px; height:44px; border-radius:8px; border:1px solid rgba(201,164,76,.3);
    background:rgba(19,36,26,.8); color:#e4dcc8; font-size:14px; cursor:pointer; display:grid; place-items:center;
    transition:background .2s, border-color .2s; }
  .jump-page:hover, .jump-page.active{ background:rgba(201,164,76,.25); border-color:var(--gold); color:#fff; }
  #jumpClose{ margin-top:20px; padding:8px 24px; border-radius:20px; border:1px solid rgba(201,164,76,.3);
    background:rgba(8,17,12,.7); color:var(--gold-soft); font-size:13px; cursor:pointer; }

  /* ---- zoom overlay ---- */
  #zoom{ position:fixed; inset:0; z-index:40; display:none; place-items:center; overflow:hidden;
    background:rgba(5,10,7,.97); touch-action:none; }
  #zoom.open{ display:grid; }
  #zoomImg{ position:absolute; top:0; left:0; transform-origin:0 0; will-change:transform;
    user-select:none; -webkit-user-drag:none; -webkit-touch-callout:none; }
  #zoomClose{ position:fixed; top:calc(env(safe-area-inset-top,0) + 12px); right:14px; z-index:42;
    width:44px; height:44px; border-radius:50%; border:1px solid rgba(201,164,76,.4);
    background:rgba(8,17,12,.7); color:#eee; font-size:20px; cursor:pointer; display:grid; place-items:center; }
  #zoomTip{ position:fixed; bottom:calc(env(safe-area-inset-bottom,0) + 16px); left:50%; transform:translateX(-50%); z-index:42;
    font-size:12px; color:#e4dcc8; background:rgba(8,17,12,.7); border:1px solid rgba(201,164,76,.3);
    padding:6px 14px; border-radius:20px; pointer-events:none; transition:opacity .6s; }

  #hint{ position:fixed; top:calc(env(safe-area-inset-top,0) + 16px); left:50%; transform:translateX(-50%); z-index:6;
    font-size:13px; letter-spacing:.3px; color:#e4dcc8; background:rgba(8,17,12,.72); border:1px solid rgba(201,164,76,.3);
    padding:8px 16px; border-radius:30px; transition:opacity .7s; cursor:pointer; text-align:center; max-width:88vw; }
  #loader{ position:fixed; inset:0; z-index:50; display:grid; place-items:center; color:var(--gold); letter-spacing:7px; font-size:14px; background:var(--green-deep); }
  #loader span{ animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:.35} 50%{opacity:1} }
</style>
</head>
<body>
  <div class="bg">
    <div class="bg-base"></div><div class="pattern"></div>
    <div class="glow g1"></div><div class="glow g2"></div>
    <div class="grain"></div><div class="vignette"></div>
  </div>

  <div id="loader"><span>D O M I N I O</span></div>
  <div id="hint">Toca los lados para pasar · pellizca o pulsa 🔍 para acercar y leer</div>

  <div id="stage"><div id="bookWrap"><div id="book"></div></div></div>

  <div class="tapzone" id="tzLeft"><div class="arrow">‹</div></div>
  <div class="tapzone" id="tzRight"><div class="arrow">›</div></div>
  <div id="counter">1 / 36</div>
  <button class="toolbar-btn" id="zoomBtn" title="Acercar para leer">🔍</button>
  <button class="toolbar-btn" id="fullscreenBtn" title="Pantalla completa">⛶</button>

  <!-- page jump modal -->
  <div id="jumpModal">
    <div id="jumpInner">
      <h3>Ir a página</h3>
      <div id="jumpGrid"></div>
      <button id="jumpClose">Cerrar</button>
    </div>
  </div>

  <!-- zoom reader -->
  <div id="zoom">
    <img id="zoomImg" alt="">
    <button id="zoomClose" title="Cerrar">✕</button>
    <div id="zoomTip">Pellizca para acercar · arrastra para mover · doble toque</div>
  </div>

  <script src="lib/page-flip.browser.js"></script>
  <script>
    /* ========== CONFIG ========== */
    const CFG = {
      total: 36,
      aspect: 1980 / 1530,
      flipTime: 600,
      swipeDist: 22,
      audioVol: 0.85,
      audioPoolSize: 4,
      maxZoom: 6,
      minZoom: 1,
    };

    const bookEl  = document.getElementById('book');
    const wrapEl  = document.getElementById('bookWrap');
    const counter = document.getElementById('counter');
    const stage   = document.getElementById('stage');

    /* ========== RESPONSIVE SIZING (mobile-first) ========== */
    function isMobile(){ return window.innerWidth <= 768; }
    function calcSize(){
      const mobile = isMobile();
      const mW = window.innerWidth  * (mobile ? 0.98 : 0.82);
      const mH = window.innerHeight * (mobile ? 0.97 : 0.90);
      let h=mH, w=h/CFG.aspect;
      if(w>mW){ w=mW; h=w*CFG.aspect; }
      return {w:Math.floor(w),h:Math.floor(h)};
    }

    /* ========== PAGES ========== */
    function makePages(){
      let html='';
      for(let i=1;i<=CFG.total;i++){
        const n=String(i).padStart(2,'0');
        html += `<div class="page"><img src="pages/page-${n}.jpg" alt="Página ${i}" loading="lazy"></div>`;
      }
      bookEl.innerHTML=html;
    }
    function preload(idx){ for(let k=idx-1;k<=idx+2;k++){ if(k>=0&&k<CFG.total){ const n=String(k+1).padStart(2,'0'); new Image().src=`pages/page-${n}.jpg`; } } }

    /* ========== AUDIO ========== */
    const POOL=[]; let unlocked=false, pi=0;
    function buildPool(){ for(let i=0;i<CFG.audioPoolSize;i++){ const a=new Audio('sound/page-flip.mp3'); a.preload='auto'; a.volume=CFG.audioVol; POOL.push(a); } }
    function unlockAudio(){ if(unlocked) return; unlocked=true;
      POOL.forEach(a=>{ a.muted=true; const p=a.play(); if(p&&p.then) p.then(()=>{a.pause();a.currentTime=0;a.muted=false;}).catch(()=>{a.muted=false;}); }); }
    function playFlip(){ if(!POOL.length) return; const a=POOL[pi=(pi+1)%POOL.length]; try{ a.currentTime=0; const p=a.play(); if(p&&p.catch) p.catch(()=>{}); }catch(e){} }

    /* ========== FLIPBOOK ========== */
    let pf;
    function buildFlip(startIndex){
      const {w,h}=calcSize(); wrapEl.style.width=w+'px'; wrapEl.style.height=h+'px';
      pf=new St.PageFlip(bookEl,{ width:w,height:h,size:'fixed', usePortrait:true, showCover:true,
        drawShadow:true, maxShadowOpacity:0.3, flippingTime:CFG.flipTime, swipeDistance:CFG.swipeDist,
        disableFlipByClick:false, mobileScrollSupport:false, useMouseEvents:true });
      pf.loadFromHTML(document.querySelectorAll('#book .page'));
      if(startIndex) pf.turnToPage(startIndex);
      pf.on('flip', e=>{ updateCounter(e.data); preload(e.data); updateHash(e.data); });
      pf.on('changeState', e=>{ if(e.data==='flipping') playFlip(); });
      updateCounter(pf.getCurrentPageIndex()); preload(pf.getCurrentPageIndex());
    }
    let dimTimer;
    function updateCounter(idx){ counter.textContent=(idx+1)+' / '+CFG.total; counter.classList.remove('dim');
      clearTimeout(dimTimer); dimTimer=setTimeout(()=>counter.classList.add('dim'),2500); }

    /* ========== DEEP-LINK (hash) ========== */
    function getHashPage(){
      const m=location.hash.match(/page=(\d+)/);
      if(m){ const p=parseInt(m[1],10); if(p>=1&&p<=CFG.total) return p-1; }
      return 0;
    }
    function updateHash(idx){ history.replaceState(null,'','#page='+(idx+1)); }

    /* ========== TAP-ZONE NAV ========== */
    function goNext(){ unlockAudio(); if(pf) pf.flipNext('top'); }
    function goPrev(){ unlockAudio(); if(pf) pf.flipPrev('top'); }
    function bindZone(el, fn){
      let sx=0,sy=0,st=0,moved=false;
      el.addEventListener('pointerdown', e=>{ unlockAudio(); sx=e.clientX; sy=e.clientY; st=e.timeStamp; moved=false; });
      el.addEventListener('pointermove', e=>{ if(Math.hypot(e.clientX-sx,e.clientY-sy)>14) moved=true; });
      el.addEventListener('pointerup',   e=>{ const dx=e.clientX-sx;
        if(!moved && (e.timeStamp-st)<400) fn(); else if(Math.abs(dx)>30){ dx>0?goPrev():goNext(); } });
    }
    bindZone(document.getElementById('tzLeft'),  goPrev);
    bindZone(document.getElementById('tzRight'), goNext);
    addEventListener('keydown', e=>{ if(zoomOpen){ if(e.key==='Escape') closeZoom(); return; }
      if(jumpOpen){ if(e.key==='Escape') closeJump(); return; }
      if(e.key==='ArrowRight') goNext(); if(e.key==='ArrowLeft') goPrev(); });

    /* ========== PAGE JUMP MODAL ========== */
    const jumpModal = document.getElementById('jumpModal');
    const jumpGrid  = document.getElementById('jumpGrid');
    let jumpOpen = false;

    (function buildJumpGrid(){
      for(let i=1;i<=CFG.total;i++){
        const btn=document.createElement('button');
        btn.className='jump-page';
        btn.textContent=i;
        btn.addEventListener('click',()=>{ if(pf){ pf.turnToPage(i-1); updateCounter(i-1); updateHash(i-1); } closeJump(); });
        jumpGrid.appendChild(btn);
      }
    })();
    function openJump(){
      jumpOpen=true; jumpModal.classList.add('open');
      const cur=pf?pf.getCurrentPageIndex()+1:1;
      jumpGrid.querySelectorAll('.jump-page').forEach(b=>{ b.classList.toggle('active', parseInt(b.textContent)===cur); });
    }
    function closeJump(){ jumpOpen=false; jumpModal.classList.remove('open'); }
    counter.addEventListener('click', openJump);
    document.getElementById('jumpClose').addEventListener('click', closeJump);
    jumpModal.addEventListener('click', e=>{ if(e.target===jumpModal) closeJump(); });

    /* ========== FULLSCREEN ========== */
    const fsBtn = document.getElementById('fullscreenBtn');
    function toggleFullscreen(){
      if(!document.fullscreenElement && !document.webkitFullscreenElement){
        const el=document.documentElement;
        (el.requestFullscreen||el.webkitRequestFullscreen).call(el);
      } else {
        (document.exitFullscreen||document.webkitExitFullscreen).call(document);
      }
    }
    fsBtn.addEventListener('click', toggleFullscreen);
    function onFsChange(){
      fsBtn.textContent = (document.fullscreenElement||document.webkitFullscreenElement) ? '⊠' : '⛶';
      setTimeout(()=>{
        lastW=innerWidth; lastH=innerHeight;
        if(pf){ const c=pf.getCurrentPageIndex(); pf.destroy(); buildFlip(c); }
      }, 300);
    }
    document.addEventListener('fullscreenchange', onFsChange);
    document.addEventListener('webkitfullscreenchange', onFsChange);

    /* ========== ZOOM READER (focal pinch + pan, GPU/rAF) ========== */
    const zEl=document.getElementById('zoom'), zImg=document.getElementById('zoomImg'), zTip=document.getElementById('zoomTip');
    let zoomOpen=false;
    let scale=1, tx=0, ty=0;
    let baseW=0, baseH=0;
    const ptrs=new Map();
    let pinchD0=0, pinchS0=1, ancX=0, ancY=0;
    let tapT=0, tapX=0, tapY=0;

    let dirty=false;
    function schedule(){ if(!dirty){ dirty=true; requestAnimationFrame(()=>{ dirty=false;
      zImg.style.transform=`translate3d(${tx}px,${ty}px,0) scale(${scale})`; }); } }
    function clamp(){
      const cw=baseW*scale, ch=baseH*scale;
      tx = cw<=innerWidth  ? (innerWidth-cw)/2  : Math.max(innerWidth-cw,  Math.min(0, tx));
      ty = ch<=innerHeight ? (innerHeight-ch)/2 : Math.max(innerHeight-ch, Math.min(0, ty));
    }
    function setFit(){
      const nw=zImg.naturalWidth||2204, nh=zImg.naturalHeight||2852;
      const r=Math.min(innerWidth/nw, innerHeight/nh);
      baseW=nw*r; baseH=nh*r;
      zImg.style.width=baseW+'px'; zImg.style.height=baseH+'px';
    }
    function zoomTo(s, fx, fy, anim){
      s=Math.max(CFG.minZoom,Math.min(CFG.maxZoom,s));
      const ix=(fx-tx)/scale, iy=(fy-ty)/scale;
      scale=s; tx=fx-ix*scale; ty=fy-iy*scale; clamp();
      zImg.style.transition = anim ? 'transform .2s ease-out' : 'none';
      schedule();
    }
    function openZoom(idx, s){
      const n=String(idx+1).padStart(2,'0');
      zoomOpen=true; zEl.classList.add('open');
      const im=new Image();
      im.onload=()=>{
        zImg.src=im.src; setFit();
        scale=1; clamp(); zImg.style.transition='none'; schedule();
        requestAnimationFrame(()=>zoomTo(s||2.0, innerWidth/2, innerHeight/2, true));
        zTip.style.opacity='1'; setTimeout(()=>zTip.style.opacity='0',2400);
      };
      im.src=`pages-hd/page-${n}.jpg`;
    }
    function closeZoom(){ zoomOpen=false; zEl.classList.remove('open'); ptrs.clear(); }

    function midOf(){ const v=[...ptrs.values()];
      return {x:(v[0].x+v[1].x)/2, y:(v[0].y+v[1].y)/2, d:Math.hypot(v[0].x-v[1].x, v[0].y-v[1].y)}; }

    zEl.addEventListener('pointerdown', e=>{
      zEl.setPointerCapture(e.pointerId);
      zImg.style.transition='none';
      ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
      if(ptrs.size===2){ const m=midOf(); pinchD0=m.d; pinchS0=scale; ancX=(m.x-tx)/scale; ancY=(m.y-ty)/scale; }
    });
    zEl.addEventListener('pointermove', e=>{
      const p=ptrs.get(e.pointerId); if(!p) return;
      const ox=p.x, oy=p.y; p.x=e.clientX; p.y=e.clientY;
      if(ptrs.size>=2){
        const m=midOf();
        scale=Math.max(CFG.minZoom,Math.min(CFG.maxZoom, pinchS0*m.d/pinchD0));
        tx=m.x-ancX*scale; ty=m.y-ancY*scale; clamp(); schedule();
      } else if(scale>1){
        tx+=e.clientX-ox; ty+=e.clientY-oy; clamp(); schedule();
      }
    });
    zEl.addEventListener('pointerup', e=>{
      ptrs.delete(e.pointerId);
      const t=e.timeStamp;
      const isDouble = Math.hypot(e.clientX-tapX, e.clientY-tapY)<24 && t-tapT<300;
      if(isDouble){ zoomTo(scale>1.2 ? 1 : 2.8, e.clientX, e.clientY, true); tapT=0; }
      else { tapT=t; tapX=e.clientX; tapY=e.clientY; }
      if(ptrs.size===0 && scale<=1.02) closeZoom();
    });
    zEl.addEventListener('pointercancel', e=>ptrs.delete(e.pointerId));
    zEl.addEventListener('wheel', e=>{ e.preventDefault();
      zoomTo(scale*(e.deltaY<0?1.15:0.87), e.clientX, e.clientY, false); }, {passive:false});

    document.getElementById('zoomClose').addEventListener('click', closeZoom);
    document.getElementById('zoomBtn').addEventListener('click', ()=>{ if(pf) openZoom(pf.getCurrentPageIndex(), 2.2); });

    // pinch-out on the book opens the reader
    let pinchArm=false, pinchA0=0;
    function tDist(t){ return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY); }
    stage.addEventListener('touchstart', e=>{ if(!zoomOpen && e.touches.length===2){ pinchArm=true; pinchA0=tDist(e.touches); } }, {passive:true});
    stage.addEventListener('touchmove',  e=>{ if(pinchArm && !zoomOpen && e.touches.length===2 && tDist(e.touches)/pinchA0>1.08){ pinchArm=false; openZoom(pf.getCurrentPageIndex(), 1.8); } }, {passive:true});
    stage.addEventListener('touchend',   ()=>{ pinchArm=false; }, {passive:true});
    addEventListener('resize', ()=>{ if(zoomOpen){ setFit(); clamp(); zImg.style.transition='none'; schedule(); } });

    /* ========== RESPONSIVE RESIZE ========== */
    let lastW=innerWidth,lastH=innerHeight,rT;
    addEventListener('resize', ()=>{
      if(Math.abs(innerWidth-lastW)<40&&Math.abs(innerHeight-lastH)<40) return;
      lastW=innerWidth; lastH=innerHeight;
      clearTimeout(rT); rT=setTimeout(()=>{ const c=pf.getCurrentPageIndex(); pf.destroy(); buildFlip(c); },220);
    });

    /* ========== HINT (tap to dismiss) ========== */
    const hintEl=document.getElementById('hint');
    function dismissHint(){ hintEl.style.opacity='0'; setTimeout(()=>hintEl.remove(),800); }
    hintEl.addEventListener('click', dismissHint);

    /* ========== BOOT ========== */
    makePages(); buildPool();
    const startPage = getHashPage();
    const cover=new Image();
    cover.onload=()=>{
      buildFlip(startPage);
      updateHash(startPage);
      document.getElementById('loader').style.display='none';
      document.querySelectorAll('.tapzone').forEach(z=>z.classList.add('peek'));
      setTimeout(()=>document.querySelectorAll('.tapzone').forEach(z=>z.classList.remove('peek')),2600);
      setTimeout(dismissHint, 8000);
    };
    cover.onerror=()=>{ document.getElementById('loader').innerHTML='<span>Error al cargar</span>'; };
    cover.src='pages/page-01.jpg';
  </script>
</body>
</html>
