<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DOMINIO — FLC x Berdez x Sineva</title>
<style>
  :root{
    --gold:#c9a44c;
    --green-deep:#0c1712;
    --green:#16271d;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; height:100%; overflow:hidden;
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    color:#eee;
    /* Aesthetic luxury background matching the DOMINIO cover */
    background:
      radial-gradient(120% 80% at 50% 18%, rgba(201,164,76,.16), rgba(201,164,76,0) 55%),
      radial-gradient(140% 120% at 50% 120%, #1d3326 0%, var(--green) 30%, var(--green-deep) 70%, #060b08 100%);
  }
  /* film-grain + vignette overlay */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:1;
    background:
      radial-gradient(130% 100% at 50% 50%, rgba(0,0,0,0) 55%, rgba(0,0,0,.55) 100%);
    mix-blend-mode:multiply;
  }
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:1; opacity:.05;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  #stage{
    position:fixed; inset:0; z-index:2;
    display:flex; align-items:center; justify-content:center;
  }
  #bookWrap{ position:relative; filter:drop-shadow(0 26px 50px rgba(0,0,0,.6)); }
  #book{ touch-action:pan-y; }
  .page{ background:#fff; overflow:hidden; }
  .page img{ width:100%; height:100%; display:block; object-fit:cover; }

  /* subtle tap hints, fade out */
  .tapzone{
    position:fixed; top:0; bottom:0; width:30%; z-index:3;
    display:flex; align-items:center; pointer-events:none;
    opacity:0; transition:opacity .4s;
  }
  #tzLeft{ left:0; justify-content:flex-start; padding-left:14px; }
  #tzRight{ right:0; justify-content:flex-end; padding-right:14px; }
  .tapzone.show{ opacity:.0; }
  .arrow{
    font-size:30px; color:var(--gold);
    width:54px; height:54px; border-radius:50%;
    background:rgba(0,0,0,.35); border:1px solid rgba(201,164,76,.35);
    display:grid; place-items:center;
  }

  #hint{
    position:fixed; top:calc(env(safe-area-inset-top,0) + 16px); left:50%;
    transform:translateX(-50%); z-index:5;
    font-size:13px; letter-spacing:.4px; color:#d8d2c4;
    background:rgba(12,23,18,.7); border:1px solid rgba(201,164,76,.25);
    padding:8px 16px; border-radius:30px;
    transition:opacity .7s; pointer-events:none; text-align:center;
  }

  /* tiny page counter, lower-center, auto-fades */
  #counter{
    position:fixed; bottom:calc(env(safe-area-inset-bottom,0) + 14px); left:50%;
    transform:translateX(-50%); z-index:5;
    font-size:12px; letter-spacing:2px; color:var(--gold);
    background:rgba(12,23,18,.55); padding:5px 14px; border-radius:20px;
    transition:opacity .6s; pointer-events:none;
  }
  #counter.dim{ opacity:0; }

  #loader{
    position:fixed; inset:0; z-index:50; display:grid; place-items:center;
    color:var(--gold); letter-spacing:6px; font-size:14px;
    background:var(--green-deep);
  }
  #loader span{ animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:.35} 50%{opacity:1} }
</style>
</head>
<body>
  <div id="loader"><span>D O M I N I O</span></div>
  <div id="hint">Toca a la derecha para avanzar · a la izquierda para retroceder</div>

  <div id="stage"><div id="bookWrap"><div id="book"></div></div></div>

  <div class="tapzone" id="tzLeft"><div class="arrow">‹</div></div>
  <div class="tapzone" id="tzRight"><div class="arrow">›</div></div>
  <div id="counter">1 / 36</div>

  <script src="lib/page-flip.browser.js"></script>
  <script>
    const TOTAL = 36;
    const SRC_W = 1224, SRC_H = 1584;
    const ASPECT = SRC_H / SRC_W;            // height / width

    const bookEl  = document.getElementById('book');
    const wrapEl  = document.getElementById('bookWrap');
    const counter = document.getElementById('counter');

    /* ---------- build pages ---------- */
    function makePages(){
      let html = '';
      for(let i=1;i<=TOTAL;i++){
        const n = String(i).padStart(2,'0');
        html += `<div class="page"><img src="pages/page-${n}.jpg" alt="Página ${i}" loading="lazy"></div>`;
      }
      bookEl.innerHTML = html;
    }

    /* ---------- size: one big page filling the screen ---------- */
    function calcSize(){
      const mW = window.innerWidth  * 0.96;
      const mH = window.innerHeight * 0.94;
      let h = mH, w = h / ASPECT;
      if(w > mW){ w = mW; h = w * ASPECT; }
      return { w:Math.floor(w), h:Math.floor(h) };
    }

    /* ---------- page-flip sound (synthesized, no asset) ---------- */
    let actx = null;
    function ensureAudio(){
      if(!actx){
        try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
      }
      if(actx && actx.state === 'suspended') actx.resume();
    }
    function playFlip(){
      if(!actx) return;
      const t = actx.currentTime;
      const dur = 0.22;
      // white-noise burst
      const buf = actx.createBuffer(1, actx.sampleRate*dur, actx.sampleRate);
      const d = buf.getChannelData(0);
      for(let i=0;i<d.length;i++){ d[i] = (Math.random()*2-1) * (1 - i/d.length); }
      const src = actx.createBufferSource(); src.buffer = buf;
      const bp = actx.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=0.7;
      bp.frequency.setValueAtTime(1400, t);
      bp.frequency.exponentialRampToValueAtTime(3600, t+dur);
      const g = actx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.22, t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
      src.connect(bp).connect(g).connect(actx.destination);
      src.start(t); src.stop(t+dur);
    }

    /* ---------- preload neighbours for smoothness ---------- */
    function preload(idx){
      for(let k=idx-1;k<=idx+2;k++){
        if(k>=0 && k<TOTAL){
          const n=String(k+1).padStart(2,'0');
          const im=new Image(); im.src=`pages/page-${n}.jpg`;
        }
      }
    }

    /* ---------- init flipbook ---------- */
    let pf;
    function buildFlip(startIndex){
      const {w,h} = calcSize();
      wrapEl.style.width = w+'px';
      wrapEl.style.height = h+'px';
      pf = new St.PageFlip(bookEl, {
        width:w, height:h, size:'fixed',
        usePortrait:true,            // single page
        showCover:true,
        drawShadow:true,
        maxShadowOpacity:0.28,       // lighter = smoother
        flippingTime:560,
        swipeDistance:24,
        disableFlipByClick:true,     // we drive nav with our own tap zones
        mobileScrollSupport:false,
        useMouseEvents:true,
      });
      pf.loadFromHTML(document.querySelectorAll('#book .page'));
      if(startIndex) pf.turnToPage(startIndex);

      pf.on('flip', e=>{ updateCounter(e.data); preload(e.data); });
      pf.on('changeState', e=>{ if(e.data==='flipping') playFlip(); });
      updateCounter(pf.getCurrentPageIndex());
      preload(pf.getCurrentPageIndex());
    }

    /* ---------- counter (auto fade) ---------- */
    let dimTimer;
    function updateCounter(idx){
      counter.textContent = (idx+1) + ' / ' + TOTAL;
      counter.classList.remove('dim');
      clearTimeout(dimTimer);
      dimTimer = setTimeout(()=>counter.classList.add('dim'), 1800);
    }

    /* ---------- tap-zone navigation ---------- */
    let downX=0, downY=0, downT=0;
    document.addEventListener('pointerdown', e=>{
      ensureAudio();
      downX=e.clientX; downY=e.clientY; downT=e.timeStamp;
    }, {passive:true});
    document.addEventListener('pointerup', e=>{
      const moved = Math.hypot(e.clientX-downX, e.clientY-downY);
      const quick = (e.timeStamp-downT) < 350;
      if(moved < 12 && quick){          // it's a tap, not a drag
        if(e.clientX > window.innerWidth/2) pf.flipNext('top');
        else pf.flipPrev('top');
      }
    }, {passive:true});

    // keyboard for desktop
    addEventListener('keydown', e=>{
      if(e.key==='ArrowRight') pf.flipNext('top');
      if(e.key==='ArrowLeft')  pf.flipPrev('top');
    });

    /* ---------- responsive (debounced, only on real change) ---------- */
    let lastW=innerWidth, lastH=innerHeight, rT;
    addEventListener('resize', ()=>{
      if(Math.abs(innerWidth-lastW)<40 && Math.abs(innerHeight-lastH)<40) return;
      lastW=innerWidth; lastH=innerHeight;
      clearTimeout(rT);
      rT=setTimeout(()=>{
        const cur = pf.getCurrentPageIndex();
        pf.destroy();
        buildFlip(cur);
      }, 220);
    });

    /* ---------- boot ---------- */
    makePages();
    const cover = new Image();
    cover.onload = ()=>{
      buildFlip(0);
      document.getElementById('loader').style.display='none';
      setTimeout(()=>{ const h=document.getElementById('hint'); h.style.opacity='0'; setTimeout(()=>h.remove(),800); }, 4200);
    };
    cover.onerror = ()=>{ document.getElementById('loader').innerHTML='<span>Error al cargar</span>'; };
    cover.src='pages/page-01.jpg';
  </script>
</body>
</html>
